<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My First Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --accent: #e8c97e;
      --text: #f0ece4;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.6;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.6s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      padding: 0.9rem 2.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.8s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,201,126,0.3);
    }

    .btn:active { transform: translateY(0); }

    .btn svg { transition: transform 0.3s ease; }
    .btn:hover svg { transform: rotate(20deg); }

    /* Message box */
    .message-box {
      margin-top: 2rem;
      background: var(--surface);
      border: 1px solid rgba(232,201,126,0.2);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 1.4rem 1.8rem;
      text-align: left;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .message-box.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .message-box .msg-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .message-box p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Welcome</p>
    <h1>My <span>First</span><br>Website</h1>
    <p class="subtitle">Click the button below to reveal a message. This is just the beginning of your web journey.</p>

    <button class="btn" onclick="showMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 8v4l3 3"/>
      </svg>
      Click Me!
    </button>

    <div class="message-box" id="msgBox">
      <p class="msg-label">Message</p>
      <p>🎉 Hello Aradhya!!</p>
    </div>
  </div>

  <script>
    function showMessage() {
      const box = document.getElementById('msgBox');
      box.classList.toggle('visible');
      const btn = document.querySelector('.btn');
      btn.textContent = box.classList.contains('visible') ? '✓ Message Shown!' : 'Click Me!';
      if (!box.classList.contains('visible')) {
        // re-add icon
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v4l3 3"/></svg> Click Me!`;
      }
    }
  </script>
</body>
</html>
